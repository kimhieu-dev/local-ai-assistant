<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen Local Chat</title>
    <style>
        body { font-family: sans-serif; background: #343541; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 20px; padding: 10px; border-radius: 5px; max-width: 80%; }
        .user { background: #444654; align-self: flex-end; margin-left: auto; }
        .bot { background: #10a37f; align-self: flex-start; }
        #input-area { padding: 20px; background: #40414f; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; outline: none; }
        button { padding: 10px 20px; background: #19c37d; border: none; color: white; cursor: pointer; border-radius: 5px; }
        button:disabled { background: #555; }
    </style>
</head>
<body>
    <div id="chat-container"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Nhập tin nhắn..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="send-btn" onclick="sendMessage()">Gửi</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            const btn = document.getElementById('send-btn');
            if (!input.value.trim()) return;

            const userMsg = input.value;
            container.innerHTML += `<div class="message user">${userMsg}</div>`;
            input.value = '';
            btn.disabled = true;

            try {
                const response = await fetch('http://localhost:8080/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [{ role: "system", content: "Bạn là trợ lý tiếng Việt." }, { role: "user", content: userMsg }],
                        temperature: 0.7
                    })
                });
                const data = await response.json();
                const botReply = data.choices[0].message.content;
                container.innerHTML += `<div class="message bot">${botReply}</div>`;
            } catch (error) {
                container.innerHTML += `<div class="message bot" style="background:red">Lỗi: Không kết nối được server!</div>`;
            }
            btn.disabled = false;
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
